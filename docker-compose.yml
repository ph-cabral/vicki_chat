services:
  chat-agent:
    build:
      context: .
      dockerfile: app/Dockerfile.api
    container_name: n8n_chat_agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_MODEL: ${OPENAI_API_MODEL}
      ANTHROPIC_KEY: ${ANTHROPIC_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL}
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      HIK_USER: ${HIK_USER}
      HIK_PASS: ${HIK_PASS}
      HIK_DEVICES: ${HIK_DEVICES}
      HIK_IPS: ${HIK_IPS}
      QDRANT_URL: http://n8n_qdrant:6333
      QDRANT_COLLECTION: cvs
      MODEL_NAME: gpt-4.1-mini
      TZ: ${TZ}
      CORS: ${CORS}
      PUBLIC_BASE_URL: http://10.10.0.159:8000
    networks:
      - [ai-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./snapshots:/code/snapshots

networks:
  ai-net:
    external: true