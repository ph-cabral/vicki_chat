services:          # ← FALTA ESTA LÍNEA
  chat-agent:
    build:
      context: ./app
      dockerfile: Dockerfile.api
    container_name: n8n_chat_agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_MODEL: ${OPENAI_API_MODEL}
      ANTHROPIC_KEY: ${ANTHROPIC_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL}
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      QDRANT_URL: http://n8n_qdrant:6333
      QDRANT_COLLECTION: cvs
      MODEL_NAME: gpt-4.1-mini
      TZ: ${TZ}
      CORS: ${CORS}
    networks:
      - ai-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  chat-frontend:
    build: .
    container_name: viki_chat_frontend
    restart: unless-stopped
    command: streamlit run app/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      chat-agent:
        condition: service_started
    networks:
      - ai-net

networks:
  ai-net:
    external: true

